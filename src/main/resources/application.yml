spring:
  application:
    name: car-rental-backend

  # Datasource is configured per-profile (dev / test / prod).
  # If no profile is active, Spring Boot auto-selects H2 from the classpath.

  jpa:
    # Flyway owns the schema — Hibernate only validates the mapping.
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:my-very-secret-key-for-development-only-must-be-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h

server:
  port: 8080
  error:
    include-message: always   # propagate message into ProblemDetail

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
