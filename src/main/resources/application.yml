spring:
  application:
    name: car-rental-backend

  profiles:
    default: dev

  # Datasource is configured per-profile (dev / test / prod).
  # Default profile is "dev" (H2 in-memory). Use "prod" for PostgreSQL.

  jpa:
    # Flyway owns the schema — Hibernate only validates the mapping.
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:my-very-secret-key-for-development-only-must-be-at-least-32-chars}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}    # 1 h
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 d

server:
  port: 8080
  error:
    include-message: always   # propagate message into ProblemDetail

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
