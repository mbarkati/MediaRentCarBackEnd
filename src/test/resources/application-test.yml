spring:
  datasource:
    url: jdbc:h2:mem:car_rental_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Flyway creates the schema before Hibernate validates it
  flyway:
    enabled: true

jwt:
  # Short, predictable key for tests — never used in prod
  secret: test-secret-key-for-tests-only-must-be-at-least-32-chars-long
  expiration-ms: 3600000   # 1 h

logging:
  level:
    root: WARN
    com.mourad.backend: INFO
